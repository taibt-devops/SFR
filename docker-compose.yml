# Deploy SRF: nginx (frontend + reverse-proxy /api) + proxy Claude.
# Cấu hình bí mật ở .env (cùng thư mục): CLAUDE_TOKEN, PROXY_SECRET.
services:
  proxy:
    build:
      context: .
      dockerfile: server/Dockerfile
    env_file: .env          # CLAUDE_TOKEN, PROXY_SECRET → runtime của proxy
    expose:
      - "8787"
    # DNS công khai: host Ubuntu dùng systemd-resolved (127.0.0.53) mà container không tới được
    # → cần resolver riêng cho proxy ra api.anthropic.com (tránh EAI_AGAIN).
    dns:
      - 8.8.8.8
      - 1.1.1.1
    restart: unless-stopped

  # STT local cho luyện nói — có ffmpeg, nhận webm/opus. Model tải lần đầu (cache ở volume).
  whisper:
    image: onerahmet/openai-whisper-asr-webservice:latest
    environment:
      ASR_MODEL: base
      ASR_ENGINE: faster_whisper
    volumes:
      - whisper-cache:/root/.cache
    expose:
      - "9000"
    # DNS công khai để tải model từ HuggingFace (host systemd-resolved → container không resolve được).
    dns:
      - 8.8.8.8
      - 1.1.1.1
    restart: unless-stopped

  web:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        VITE_PROXY_URL: /api
        VITE_PROXY_SECRET: ${PROXY_SECRET}   # nướng vào bundle; phải KHỚP PROXY_SECRET của proxy
        VITE_WHISPER_URL: /whisper/asr
    ports:
      - "8088:80"
    depends_on:
      - proxy
      - whisper
    restart: unless-stopped

volumes:
  whisper-cache:
