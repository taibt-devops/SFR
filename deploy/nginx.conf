server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  # SPA — mọi route trả index.html (app dùng state, không có router phía server).
  location / {
    try_files $uri /index.html;
  }

  # Service worker: không cache để bản build mới được nhận ngay.
  location = /sw.js {
    add_header Cache-Control "no-cache";
    try_files $uri =404;
  }

  # Gọi Claude qua proxy (CÙNG ORIGIN → không CORS; token nằm ở container proxy).
  #   /api        → proxy "/"      (chat)
  #   /api/mine   → proxy "/mine"  (mining)
  #   /api/story  → proxy "/story" (mini-story)
  location = /api {
    proxy_pass http://proxy:8787/;
    proxy_set_header Host $host;
  }
  location /api/ {
    proxy_pass http://proxy:8787/;
    proxy_set_header Host $host;
  }

  # STT cho luyện nói → container whisper (/whisper/asr → asr:9000/asr).
  location /whisper/ {
    proxy_pass http://whisper:9000/;
    proxy_set_header Host $host;
    client_max_body_size 25m;       # clip audio
    proxy_read_timeout 180s;        # suy luận CPU có thể vài giây
    proxy_send_timeout 180s;
  }
}
